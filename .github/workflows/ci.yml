name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch numpy scikit-learn pyyaml polars pyarrow imbalanced-learn pytest pandas tqdm

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check projects/ tests/

      - name: Run ruff format check
        run: ruff format --check projects/ tests/

  type-check:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-PyYAML torch numpy pandas scikit-learn

      - name: Run mypy
        run: mypy projects/gazprom_emergency/ --ignore-missing-imports

  coverage:
    name: test coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch numpy scikit-learn pyyaml polars pyarrow imbalanced-learn pytest pytest-cov pandas tqdm

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=projects/gazprom_emergency --cov-report=term-missing --cov-report=xml

      - name: Check coverage threshold
        run: |
          pytest tests/ --cov=projects/gazprom_emergency --cov-fail-under=60 || (
            echo "Coverage below 60%. Add tests for new code."
            exit 1
          )