# gazprom_emergency — конфигурация пайплайна прогноза аварий
#
# Все пути можно переопределять через переменные окружения:
#   DATA_DIR, ARTIFACTS_DIR

# ====== Пути к данным ======
data:
  source_dir: "Data"
  opers_file: "opers.csv"
  stpa_file: "stpa5000 (2).csv"
  processed_dir: "artifacts/datasets/gazprom_emergency/processed"
  chunk_size: 50000
  # Разделители CSV
  opers_separator: ","
  stpa_separator: ";"
  # У stpa-файла первая колонка пустая (начинается с ;) — пропускать её
  stpa_skip_first_column: true
  # Имя колонки времени в opers.csv (переименовывается в batch_time при merge)
  opers_join_column: "date"

# ====== Модель ======
model:
  architecture: "emergency_predictor"
  hidden_dims: [256, 128, 64, 32]
  # dropout=0.0 — для разреженных данных (95% нулей) регуляризация убивает сигнал.
  # Эмпирически проверено: dropout=0 даёт AUC=0.73 против 0.70 при dropout=0.15.
  dropout: 0.0
  save_path: "artifacts/models/gazprom_emergency_model.pth"

# ====== Обучение ======
training:
  optimizer: "adam"
  # lr=0.003 — быстрее сходимость, чем при 0.001 (проверено эмпирически)
  learning_rate: 0.003
  weight_decay: 0.0001
  # 30 эпох вместо 10 — нужно больше итераций для разреженных фичей (95% нулей)
  epochs: 30
  batch_size: 256
  # SMOTE выключен: для сильно несбалансированных временных рядов
  # cost-sensitive learning (pos_weight) надёжнее и не создаёт артефактов.
  use_smote: false
  smote_sampling_strategy: 0.5
  test_size: 0.2
  # random вместо chronological: между июнем-октябрём (train) и октябрём-декабрём (val)
  # есть сильный data drift (val AUC=0.47 при chronological split). Random split
  # позволяет модели использовать паттерны из всех периодов.
  split_strategy: "random"
  random_state: 42
  seed: 42
  num_workers: 0
  pin_memory: true
  early_stopping_patience: 10
  # Cost-sensitive learning: вес положительного класса в BCEWithLogitsLoss.
  # 10.0 оптимально для 3% positive rate (проверено эмпирически):
  #   pw=5  → AUC=0.70, F1=0.14
  #   pw=10 → AUC=0.73, F1=0.23 ← лучший баланс
  #   pw=30 → AUC=0.52 (degenerate — все предсказания ~0.97)
  # После агрегации opers по batch_time (is_emergency=max) ~88% меток positive.
  # Классы инвертированы: positive — большинство. pos_weight=1.0 (сбалансированный).
  pos_weight: 0.15
  pos_weight_mode: "explicit"
  # Масштабирование: "standard" (z-score) лучше для MLP с BatchNorm, чем MinMax
  scaler_type: "standard"
  # Gradient clipping: null (выключен). При pos_weight=10 норма градиента ≈0.24,
  # clipping не нужен и только замедляет сходимость.
  gradient_clip_norm: null
  # LR scheduler снижает шаг при стагнации val_loss
  scheduler: "reduce_on_plateau"
  scheduler_factor: 0.5
  scheduler_patience: 3
  scheduler_min_lr: 0.000001

# ====== Предсказание ======
prediction:
  threshold: 0.78
  horizon_hours: 3
  output_path: "artifacts/predictions/gazprom_emergency_predictions.csv"
  # Добавлять ли в выходной CSV контекст из opers.csv:
  #   n_ops, n_emergency_ops, ground_truth (часовая max-агрегация).
  # Это помогает понять, что прогноз строится на уровне ЧАСА, а не отдельной
  # операции: час с prediction=1 корректен, если в нём есть хотя бы одна
  # аварийная операция, даже если конкретная проверяемая операция — false.
  attach_opers_context: true

# ====== Валидация данных (#11) ======
validation:
  enabled: true
  duplicate_keys_strategy: "fail"  # "fail" | "drop" | "aggregate"
  nan_strategy: "fill_median"      # "fail" | "fill_mean" | "fill_median" | "fill_zero" | "drop"
  inf_strategy: "replace_with_nan" # "fail" | "replace_with_nan"
  max_nan_fraction_per_row: 0.9
  max_join_multiplicity: 1.5
  strict_binary_target: true
  expected_feature_dtype: "float32"

# ====== Feature engineering (#12) ======
feature_engineering:
  add_time_features: true
  lag_sizes: [1, 3, 6]
  rolling_windows: [3, 6, 12]
  rolling_n_features: 50  # первые N признаков для лагов/rolling
  pca_components: null    # null | float (e.g. 0.95) | int
  keep_original_features: true

# ====== Эксперименты (#13) ======
experiment:
  models_to_compare: ["mlp"]  # "mlp", "logreg", "random_forest", "xgboost", "lightgbm"
  selection_metric: "pr_auc"  # "pr_auc" | "roc_auc" | "f1" | "recall" | "precision" | "cost"
  cv_folds: 0                 # 0 = выключено
  optuna_trials: 0            # 0 = выключено
  optuna_model: "mlp"
  optuna_timeout: 600

# ====== Оптимизация порога (#14) ======
threshold:
  optimize: true
  metric: "f1"               # "f1" | "recall_at_precision" | "cost" | "youden"
  min_precision: 0.5
  calibration: "none"        # "none" | "isotonic" | "sigmoid"
  save_curves: true

# ====== MLflow (#15) ======
mlflow:
  enabled: false
  tracking_uri: ""
  experiment_name: "gazprom_emergency"
  registered_model_name: null
  stage: "Staging"

# ====== Стоимость ошибок (#17) ======
cost_matrix:
  cost_fn: 1000.0   # пропуск аварии
  cost_fp: 10.0     # ложная тревога
  benefit_tp: 990.0 # предотвращённая авария
  benefit_tn: 0.0